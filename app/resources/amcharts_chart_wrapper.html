<!--[main]-->
<div id="{$chart_id}" style="width: {$width}; height: {$height};"></div>
<script>
(function() {
    if (!window.AdiantiAmCharts) {
        window.AdiantiAmCharts = {
            roots: {},
            dispose: function(chartId) {
                if (this.roots[chartId]) {
                    this.roots[chartId].dispose();
                    delete this.roots[chartId];
                }
            },
            render: function(chartId, config) {
                if (typeof am5 === 'undefined') {
                    console.error('amCharts not loaded. Check app/templates/adminbs5/libraries.html');
                    return;
                }

                this.dispose(chartId);

                var root = am5.Root.new(chartId);
                this.roots[chartId] = root;
                root.setThemes([am5themes_Animated.new(root)]);

                if (config.type === 'line' || config.type === 'bar') {
                    this.renderXY(root, config);
                } else if (config.type === 'donut') {
                    this.renderDonut(root, config);
                } else {
                    console.error('Unsupported chart type: ' + config.type);
                }
            },
            renderTitle: function(root, title) {
                if (!title) {
                    return;
                }

                root.container.children.unshift(
                    am5.Label.new(root, {
                        text: title,
                        fontSize: 16,
                        fontWeight: '500',
                        paddingBottom: 20
                    })
                );
            },
            renderXY: function(root, config) {
                var zoomEnabled = !!config.zoomEnabled;
                var chart = root.container.children.push(
                    am5xy.XYChart.new(root, {
                        panX: zoomEnabled,
                        panY: false,
                        wheelX: zoomEnabled ? 'panX' : 'none',
                        wheelY: zoomEnabled ? 'zoomX' : 'none',
                        paddingTop: 10,
                        paddingBottom: zoomEnabled ? 30 : 15,
                        marginBottom: 20
                    })
                );

                this.renderTitle(root, config.title);

                var xAxis = chart.xAxes.push(
                    am5xy.CategoryAxis.new(root, {
                        categoryField: config.categoryField,
                        renderer: am5xy.AxisRendererX.new(root, { minGridDistance: 30 }),
                        tooltip: am5.Tooltip.new(root, {})
                    })
                );
                xAxis.data.setAll(config.data || []);

                var yAxis = chart.yAxes.push(
                    am5xy.ValueAxis.new(root, {
                        renderer: am5xy.AxisRendererY.new(root, {})
                    })
                );

                (config.series || []).forEach(function(item) {
                    var series;

                    if (config.type === 'line') {
                        series = chart.series.push(
                            am5xy.LineSeries.new(root, {
                                name: item.name,
                                xAxis: xAxis,
                                yAxis: yAxis,
                                valueYField: item.valueField,
                                categoryXField: config.categoryField,
                                tooltip: am5.Tooltip.new(root, { labelText: '{name}: {valueY}' })
                            })
                        );

                        series.strokes.template.setAll({ strokeWidth: 2 });
                        series.bullets.push(function() {
                            return am5.Bullet.new(root, {
                                sprite: am5.Circle.new(root, { radius: 4 })
                            });
                        });
                    } else {
                        series = chart.series.push(
                            am5xy.ColumnSeries.new(root, {
                                name: item.name,
                                xAxis: xAxis,
                                yAxis: yAxis,
                                valueYField: item.valueField,
                                categoryXField: config.categoryField,
                                tooltip: am5.Tooltip.new(root, { labelText: '{name}: {valueY}' })
                            })
                        );
                    }

                    series.data.setAll(config.data || []);
                    series.appear(800);
                });

                var cursor = am5xy.XYCursor.new(root, {
                    behavior: zoomEnabled ? 'zoomX' : 'none'
                });
                chart.set('cursor', cursor);

                if (zoomEnabled) {
                    chart.set('scrollbarX', am5.Scrollbar.new(root, {
                        orientation: 'horizontal',
                        marginTop: 40,
                        marginBottom: 40
                    }));
                }
                chart.appear(1000, 100);
            },
            renderDonut: function(root, config) {
                this.renderTitle(root, config.title);

                var chart = root.container.children.push(
                    am5percent.PieChart.new(root, {
                        layout: root.verticalLayout,
                        innerRadius: am5.percent(config.innerRadius || 60)
                    })
                );

                var series = chart.series.push(
                    am5percent.PieSeries.new(root, {
                        valueField: config.valueField,
                        categoryField: config.categoryField
                    })
                );

                series.data.setAll(config.data || []);
                series.appear(1000, 100);
                chart.appear(1000, 100);
            }
        };
    }

    window.AdiantiAmCharts.render('{$chart_id}', {$config|raw});
})();
</script>
<!--[/main]-->
